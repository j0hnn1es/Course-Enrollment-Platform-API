version: '3.9'

# Production docker-compose configuration
# For use with managed cloud databases (RDS, Cloud SQL, Azure Database)
# Database should be created separately in your cloud provider

services:
  web:
    build: .
    container_name: course-enrollment-api-prod
    ports:
      - "8000:8000"
    environment:
      # Load from .env file or set via container platform secrets
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Optional: Add resource limits for cloud deployments
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M
